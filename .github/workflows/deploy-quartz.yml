name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout secondBrain repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Quartz v4
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: _quartz_src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: _quartz_src/package-lock.json

      - name: Install Quartz dependencies
        run: npm ci
        working-directory: _quartz_src

      - name: Copy config and content into Quartz
        run: |
          cp quartz/quartz.config.ts _quartz_src/quartz.config.ts
          cp quartz/quartz.layout.ts _quartz_src/quartz.layout.ts
          cp -r quartz/content/* _quartz_src/content/

      - name: Build Quartz site
        run: npx quartz build
        working-directory: _quartz_src

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _quartz_src/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
