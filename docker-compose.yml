version: "3.8"

# ============================================================
# 세컨드브레인 Docker Compose
# Phase별 서비스 주석 해제하여 활성화
# ============================================================

services:

  # ── Phase B: n8n 워크플로우 자동화 ─────────────────────────
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    image: secondbrain-n8n:local
    container_name: secondbrain-n8n
    restart: unless-stopped
    ports:
      - "15678:15678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
      - OBSIDIAN_VAULT_PATH=/vault
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LINEAR_API_KEY=${LINEAR_API_KEY}
      - LINEAR_ISSUE_ID=${LINEAR_ISSUE_ID}
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/workflows
      - ./scripts:/home/node/scripts
      - ${OBSIDIAN_VAULT_PATH}:/vault
    networks:
      - secondbrain-net

  # ── Phase B: MiniFlux RSS 리더 ─────────────────────────────
  miniflux:
    image: miniflux/miniflux:latest
    container_name: secondbrain-miniflux
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${MINIFLUX_DATABASE_URL}
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
      - ADMIN_USERNAME=${MINIFLUX_ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${MINIFLUX_ADMIN_PASSWORD}
    depends_on:
      - miniflux-db
    networks:
      - secondbrain-net

  miniflux-db:
    image: postgres:15-alpine
    container_name: secondbrain-miniflux-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=miniflux
      - POSTGRES_DB=miniflux
    volumes:
      - miniflux_db_data:/var/lib/postgresql/data
    networks:
      - secondbrain-net

  # ── Phase C: LightRAG 벡터 DB ──────────────────────────────
  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    container_name: secondbrain-lightrag
    restart: unless-stopped
    ports:
      - "9621:9621"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_BINDING=openai
      - LLM_MODEL=gpt-4o-mini
      - EMBEDDING_BINDING=openai
      - EMBEDDING_MODEL=text-embedding-3-small
      - MAX_TOKENS=32768
    volumes:
      - lightrag_data:/app/data
    networks:
      - secondbrain-net

  # ── Phase D: GPT Researcher (심층 리서치) ──────────────────
  gpt-researcher:
    build:
      context: .
      dockerfile: Dockerfile.gpt-researcher
    image: secondbrain-gpt-researcher:local
    container_name: secondbrain-gpt-researcher
    restart: unless-stopped
    ports:
      - "8888:8000"
    environment:
      # LLM: DeepSeek V3 (OpenAI 호환)
      - OPENAI_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_BASE_URL=https://api.deepseek.com/v1
      - FAST_LLM=openai:deepseek-chat
      - SMART_LLM=openai:deepseek-chat
      - STRATEGIC_LLM=openai:deepseek-chat
      # 임베딩: OpenAI (DeepSeek 임베딩 미지원)
      - EMBEDDING_PROVIDER=openai
      - OPENAI_EMBEDDINGS_API_KEY=${OPENAI_API_KEY}
      # 웹 검색: DuckDuckGo (무료, API 키 불필요)
      - RETRIEVER=duckduckgo
      # 언어 설정
      - LANGUAGE=korean
      - REPORT_FORMAT=markdown
    volumes:
      - ./gpt-researcher-outputs:/usr/src/app/outputs
    networks:
      - secondbrain-net

volumes:
  n8n_data:
  miniflux_db_data:
  lightrag_data:

networks:
  secondbrain-net:
    driver: bridge
